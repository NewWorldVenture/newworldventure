<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — New World Venture</title>
  <meta name="description" content="Admin login page." />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="New World Venture Home">
        <span class="brand-mark">✈️</span>
        <span class="brand-text">New World Venture</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="destinations.html">Destinations</a>
        <a class="nav-link" href="gallery.html">Gallery</a>
        <a class="nav-link" href="videos.html">Videos</a>
        <a class="nav-link" href="admin.html">Admin</a>
        <a class="nav-link active" href="login.html">Login</a>
      </nav>
      <a class="btn btn-ghost" id="bannerAuthBtn" href="login.html">Login</a>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container" style="max-width:700px;">
        <div class="section-head">
          <h1>Admin Login</h1>
          <p class="muted">Sign in to access photo and video management tools.</p>
        </div>

        <form id="adminLoginForm" class="form wide">
          <label class="field">
            <span>Admin email</span>
            <input id="adminEmail" type="email" required placeholder="name@example.com" />
          </label>

          <button class="btn btn-primary" type="submit">Sign in</button>
          <p class="form-note" id="loginNote" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> New World Venture, LLC</p>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
