<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — New World Venture</title>
  <meta name="description" content="Google login for New World Venture." />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="New World Venture Home">
        <span class="brand-mark">✈️</span>
        <span class="brand-text">New World Venture</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="destinations.html">Destinations</a>
        <a class="nav-link" href="gallery.html">Gallery</a>
        <a class="nav-link" href="videos.html">Videos</a>
      </nav>

      <a class="nav-link is-hidden" data-admin-link href="admin.html">Admin</a>
      <a class="btn btn-ghost" id="loginBtn" href="login.html">Login</a>

      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container auth-shell">
        <article class="card auth-card card-body">
          <h1>Login</h1>
          <p class="muted">Only Google login is allowed.</p>
          <p class="form-note" id="loginStatus">Sign in using your Google account.</p>
          <div id="googleSignInBtn" data-google-client-id="YOUR_GOOGLE_CLIENT_ID"></div>
          <p class="muted small" id="userGreeting"></p>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> New World Venture, LLC</p>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
